version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: postgres-longtermcare
    environment:
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: long_term_care
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
